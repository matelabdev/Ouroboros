<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>impactDB | Data in Flight</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #09090b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .panel:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-box {
            text-align: center;
            padding: 2rem 0;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            text-shadow: 0 0 30px var(--accent-glow);
            transition: color 0.3s ease;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23);
        }

        button:active {
            transform: translateY(1px);
        }

        button.get-btn {
            background: #10b981;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }

        button.get-btn:hover {
            background: #059669;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.23);
        }

        .console {
            grid-column: 1 / -1;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            height: 150px;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
        }

        .console-line {
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadein 0.3s forwards;
        }

        .console-line.success { color: var(--success); }
        .console-line.error { color: var(--danger); }
        .console-line.info { color: var(--accent); }

        @keyframes fadein {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .warning-glow {
            color: var(--danger);
            text-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
        }

        .kill-btn {
            background: #000;
            border: 1px solid var(--danger);
            color: var(--danger);
            margin-top: 1rem;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }
        
        .kill-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        
        .capacity-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 2rem;
            overflow: hidden;
        }
        
        .capacity-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse-anim 2s infinite;
        }

        @keyframes pulse-anim {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

    </style>
</head>
<body>
    <div id="app" class="dashboard">
        <div class="header">
            <h1>impactDB</h1>
            <p><span class="pulse"></span> L2 Raw Socket Ring Operational</p>
        </div>

        <div class="panel">
            <h2>Network Capacity</h2>
            <div class="stat-box">
                <div class="stat-value" :class="{'warning-glow': stats.capacity_limit_warning}">{{ stats.active_packets }}</div>
                <div class="stat-label">Packets In Flight</div>
            </div>
            <div class="capacity-bar">
                <div class="capacity-fill" :style="{ width: capacityPercentage + '%', backgroundColor: stats.capacity_limit_warning ? '#ef4444' : '#3b82f6' }"></div>
            </div>
            <div style="text-align: center; margin-top: 10px; font-size: 0.8rem; color: #94a3b8;">
                Estimated Hardware Limit: ~1000 Packets
            </div>
            <div v-if="stats.dead_nodes && stats.dead_nodes.length > 0" style="margin-top: 15px; color: #ef4444; text-align: center; font-weight: 600; font-size: 0.85rem; border: 1px solid rgba(239,68,68,0.3); padding: 5px; border-radius: 8px;">
                ⚠️ ALERT: Nodes {{ stats.dead_nodes.join(', ') }} are OFFLINE. Routing automatically adjusted.
            </div>
        </div>

        <div class="panel">
            <h2>Data Injection</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Key</label>
                    <input type="text" v-model="setKey" placeholder="e.g. user_1">
                </div>
                <div class="form-group">
                    <label>Value</label>
                    <input type="text" v-model="setValue" placeholder="Hello, impactDB!">
                </div>
            </div>
            <button @click="injectData">INJECT INTO RING</button>

            <div style="margin-top: 2rem;">
                <div style="display: grid; grid-template-columns: 1fr auto; gap: 1rem;">
                    <div class="form-group" style="margin: 0;">
                        <input type="text" v-model="getKey" placeholder="Query Key (e.g. user_1)">
                    </div>
                    <button class="get-btn" @click="queryData">INTERCEPT</button>
                </div>
            </div>
            
            <button class="kill-btn" @click="killNode(2)">SIMULATE NODE 2 CRASH 💀</button>
        </div>

        <div class="console" id="console">
            <div v-for="(log, i) in logs" :key="i" class="console-line" :class="log.type">
                > {{ log.msg }}
            </div>
        </div>
    </div>

    <script type="module">
        import { createApp, ref, computed, onMounted } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

        createApp({
            setup() {
                const stats = ref({ active_packets: 0, capacity_limit_warning: false })
                const setKey = ref('')
                const setValue = ref('')
                const getKey = ref('')
                const logs = ref([])

                const capacityPercentage = computed(() => {
                    let p = (stats.value.active_packets / 1000) * 100;
                    return p > 100 ? 100 : p;
                })

                const addLog = (msg, type='info') => {
                    logs.value.push({msg, type})
                    if(logs.value.length > 20) logs.value.shift()
                    setTimeout(() => {
                        const c = document.getElementById('console')
                        if(c) c.scrollTop = c.scrollHeight
                    }, 50)
                }

                const pollStats = async () => {
                    try {
                        const res = await fetch('/api/stats')
                        const data = await res.json()
                        stats.value = data
                    } catch (e) {
                        // ignore
                    }
                    setTimeout(pollStats, 500)
                }

                const injectData = async () => {
                    if(!setKey.value || !setValue.value) return;
                    addLog(`Injecting Key: ${setKey.value}, Value: ${setValue.value} to L2 Ring...`, 'info')
                    try {
                        const res = await fetch(`/api/set?k=${encodeURIComponent(setKey.value)}&v=${encodeURIComponent(setValue.value)}`)
                        const data = await res.json()
                        addLog(`Successfully injected into the lightstream. (Latency: ${data.latency_us} µs)`, 'success')
                    } catch (e) {
                        addLog(`Failed to inject: ${e.message}`, 'error')
                    }
                }

                const queryData = async () => {
                    if(!getKey.value) return;
                    addLog(`Firing Query interceptor for Key: ${getKey.value}...`, 'info')
                    try {
                        const res = await fetch(`/api/get?k=${encodeURIComponent(getKey.value)}`)
                        const data = await res.json()
                        if(data.error) {
                            addLog(`Query Missed: ${data.error}`, 'error')
                        } else {
                            addLog(`Collision Successful! Value intercepted:\n${data.value}\n(Latency: ${data.latency_us} µs)`, 'success')
                        }
                    } catch (e) {
                        addLog(`Query failed: ${e.message}`, 'error')
                    }
                }

                const killNode = async (id) => {
                    addLog(`Sending Assassination Signal to Node ${id}...`, 'error')
                    try {
                        const res = await fetch(`/api/kill?node=${id}`)
                        const data = await res.json()
                        addLog(data.status + ' -> Watch the ring self-heal!', 'error')
                    } catch (e) { }
                }

                onMounted(() => {
                    addLog('Connection to Kernel Bypass Interface established.', 'success')
                    pollStats()
                })

                return {
                    stats, setKey, setValue, getKey, logs,
                    capacityPercentage, injectData, queryData, killNode
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
